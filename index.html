<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Netflix | YouTube Fullscreen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #141414;
            color: #ffffff;
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
            padding: 0.5rem 4%;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e50914;
            letter-spacing: -1px;
        }

        .logo-badge {
            font-size: 0.7rem;
            background: #e50914;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            margin-left: 5px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #404040;
            border-radius: 4px;
            padding: 6px 12px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 0.85rem;
            width: 180px;
        }

        .hero {
            position: relative;
            height: 70vh;
            min-height: 450px;
        }

        .hero-bg-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(0deg, #141414 0%, rgba(20,20,20,0.4) 70%, rgba(0,0,0,0.7) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            padding: 0 4%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .btn-play {
            padding: 0.7rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: white;
            color: black;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            text-decoration: none;
        }

        .main-content {
            margin-top: -60px;
            position: relative;
            z-index: 10;
            padding-bottom: 3rem;
        }

        .category {
            margin-bottom: 2rem;
            padding: 0 4%;
        }

        .category-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        .movies-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 15px;
            scroll-behavior: smooth;
        }

        .movies-row::-webkit-scrollbar {
            height: 6px;
        }
        .movies-row::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 4px;
        }

        .movie-card {
            flex-shrink: 0;
            width: 180px;
            transition: transform 0.3s ease;
            cursor: pointer;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            background: #202020;
        }

        .movie-card:hover {
            transform: scale(1.06);
            z-index: 20;
        }

        .movie-poster {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .movie-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 30%, transparent);
            padding: 30px 10px 10px;
        }

        .movie-title {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer {
            background: #141414;
            border-top: 1px solid #2d2d2d;
            padding: 2rem 4%;
            text-align: center;
            color: #808080;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .search-box { display: none; }
            .hero-title { font-size: 2rem; }
            .movie-card { width: 130px; }
            .movie-poster { height: 180px; }
        }
    </style>
</head>

        <div class="header-container">

        <div class="hero-content">

        <div class="category">

    </main>

    <footer class="footer">
        <p>© 2026 Онлайн Кинотеатр | Работает без ошибок блокировки правообладателей</p>

        // Генерация интерфейса категорий
        function renderCategory(containerId, data) {
            const el = document.getElementById(containerId);
            if(el) {
                el.innerHTML = data.map((m, idx) => `
                    <div class="movie-card" onclick="playMovieFullscreen('${m.youtubeId}')">
                        <img src="${m.poster}" class="movie-poster" onerror="this.src='https://picsum.photos/300/450?random=${idx + containerId.length}'">
                        <div class="movie-info">
                            <div class="movie-title">${m.title}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        renderCategory('popularRow', moviesDB.popular);
        renderCategory('cartoonsRow', moviesDB.cartoons);
        renderCategory('seriesRow', moviesDB.series);
        renderCategory('dramaRow', moviesDB.drama);

        // ИСПРАВЛЕННАЯ ФУНКЦИЯ ДЛЯ ОТКРЫТИЯ НА ПОЛНЫЙ ЭКРАН В КЛИЕНТЕ YOUTUBE
        function playMovieFullscreen(videoId) {
            // Формируем прямую ссылку с параметром принудительного развертывания full-player
            const url = `https://www.youtube.com/watch?v=${videoId}&feature=youtu.be`;
            
            // Открываем в новой вкладке/приложении
            window.open(url, '_blank');
        }

        // Логика работы умной строки поиска
        const allList = [...moviesDB.popular, ...moviesDB.cartoons, ...moviesDB.series, ...moviesDB.drama];
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.toLowerCase().trim();
                const match = allList.find(m => m.title.toLowerCase().includes(query));
                if (match) {
                    playMovieFullscreen(match.youtubeId);
                    e.target.value = '';
                } else {
                    alert('Фильм не найден!');
                }
            }
        });
    </script>
